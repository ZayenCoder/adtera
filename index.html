<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Offers!</title>
<style>
    /* Body style */
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #fff;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
    }

    /* Container Card */
    .card {
        background: rgba(0,0,0,0.7);
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        max-width: 500px;
        width: 100%;
    }

    h1 {
        font-size: 2.2em;
        margin-bottom: 20px;
    }

    p {
        font-size: 1.1em;
        margin-bottom: 30px;
    }

    /* Button Grid */
    .btn-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    /* Buttons */
    .btn {
        background: #ffdd00;
        color: #000;
        padding: 15px 20px;
        font-size: 1.1em;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
    }

    .btn:hover {
        background: #ffc107;
        transform: scale(1.05);
    }

    /* Footer */
    footer {
        margin-top: 30px;
        font-size: 0.85em;
        color: rgba(255,255,255,0.7);
    }

    /* Responsive Text */
    @media(max-width: 480px){
        h1 {
            font-size: 1.8em;
        }
        p {
            font-size: 1em;
        }
        .btn {
            font-size: 1em;
            padding: 12px 15px;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>🔥 Exclusive Offers!</h1>
    <p>Click any offer below to claim your reward!</p>
    
    <div class="btn-container">
        <a href="https://www.effectivegatecpm.com/nbdew3qhqw?key=f8c3ff33cf224df228052d7d73f05580" target="_blank" class="btn">Offer Coffe</a>
        <a href="https://www.effectivegatecpm.com/e3zu8b1j82?key=d5122de122cf699c7a895367ed0a1647" target="_blank" class="btn">Offer Iphone</a>
        <a href="https://www.effectivegatecpm.com/s5dka172?key=e8c9cdc77edf79ce2912ccc85528f708" target="_blank" class="btn">Offer Car</a>
        <a href="https://www.effectivegatecpm.com/ctg64cdb?key=d412a92cac6af745d69ec46aac607d5f" target="_blank" class="btn">Deshi Offer R15 Bike</a>
        <a href="https://www.effectivegatecpm.com/qzsr5dudf6?key=2f0cef4977e0b09480bd5b7769960157" target="_blank" class="btn">Offer BMW</a>
    </div>

    <footer>© 2026 YourSiteName. All rights reserved.</footer>
</div>

</body>
</html>
